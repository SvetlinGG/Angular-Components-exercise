<div class="add-theme-wrapper">
  <form class="add-theme-form">
    <h2>Create New Theme</h2>

    <div class="form-group">
      <label for="themeName">Theme Name</label>
      <input id="themeName" type="text" placeholder="Enter theme name" />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" rows="4" placeholder="Enter theme description"></textarea>
    </div>

    <button type="submit" class="btn-add">Create Theme</button>
  </form>
</div>
