<aside class="themes-list">
  <h3>Themes</h3>

  @for (theme of themes; track $index) {
    <div class="theme-card">
      <span class="theme-name">{{theme.themeName}}</span>
      <div class="theme-meta">
        <span>{{theme.created_at}}</span>
        <span>{{theme.subscribers}}</span>
      </div>
      <span class="theme-date">{{theme.updatedAt}}</span>
    </div>
  }

  

</aside>
