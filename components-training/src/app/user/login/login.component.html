<div class="login-wrapper">
  <form class="login-form" #loginForm="ngForm" (ngSubmit)="formSubmitHandler()">
    <h2>Welcome Back</h2>

    <div [ngClass]="isSpecial ? 'special' : ''" class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="Enter your email" ngModel />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Enter your password" ngModel />
    </div>

    <button type="submit" class="btn-login">Login</button>

    <p class="register-link">Don't have an account? <a href="/register">Register</a></p>
  </form>
</div>
